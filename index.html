<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로페셔널 가계부 v5.0 (DB Connected)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        .chart-box { height: 300px; position: relative; width: 100%; }
        .type-toggle input:checked + label { background-color: #2563eb; color: white; }
        #typeExpense:checked + label { background-color: #ef4444; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-slate-800">💰 스마트 가계부 <span class="text-sm font-normal text-slate-400">v5.0 DB Connected</span></h1>
        <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-semibold flex items-center gap-2 transition-all">
            📊 엑셀 저장
        </button>
    </div>

    <!-- 입력창 카드 -->
    <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-slate-200">
        <div class="grid grid-cols-1 md:grid-cols-6 gap-4">
            <div class="flex bg-slate-100 p-1 rounded-lg type-toggle">
                <input type="radio" name="trType" id="typeIncome" value="income" class="hidden" checked onchange="updateCategoryOptions()">
                <label for="typeIncome" class="flex-1 text-center py-2 rounded-md cursor-pointer text-sm font-medium transition-all">수입</label>
                <input type="radio" name="trType" id="typeExpense" value="expense" class="hidden" onchange="updateCategoryOptions()">
                <label for="typeExpense" class="flex-1 text-center py-2 rounded-md cursor-pointer text-sm font-medium transition-all">지출</label>
            </div>
            <input type="date" id="targetDate" class="border p-2 rounded-lg text-sm">
            <select id="mainCat" class="border p-2 rounded-lg text-sm"></select>
            <input type="text" id="subCat" placeholder="내용 입력" class="border p-2 rounded-lg text-sm">
            <input type="number" id="targetAmount" placeholder="금액 (숫자)" class="border p-2 rounded-lg text-sm font-semibold">
            <input type="hidden" id="editId" value="">
            <button onclick="handleSave()" id="submitBtn" class="bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-lg transition-all">저장</button>
        </div>
    </div>

    <!-- 그래프 카드 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
        <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-slate-700">📈 수입/지출 추이</h3>
                <div class="flex gap-2 items-center">
                    <input type="month" id="startMonth" onchange="renderUI()" class="text-xs border p-1 rounded">
                    <span class="text-slate-400">~</span>
                    <input type="month" id="endMonth" onchange="renderUI()" class="text-xs border p-1 rounded">
                </div>
            </div>
            <div class="chart-box"><canvas id="trendChart"></canvas></div>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-slate-700">🥧 카테고리 비중</h3>
                <input type="month" id="filterMonth" onchange="renderUI()" class="text-xs border p-1 rounded">
            </div>
            <div class="chart-box"><canvas id="categoryChart"></canvas></div>
        </div>
    </div>

    <!-- 리스트 테이블 -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-6 border-b border-slate-100"><h3 class="font-bold text-slate-700">📄 상세 내역</h3></div>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 text-slate-500 text-sm">
                    <tr>
                        <th class="p-4 font-semibold">날짜</th>
                        <th class="p-4 font-semibold text-center">구분</th>
                        <th class="p-4 font-semibold">대분류</th>
                        <th class="p-4 font-semibold">상세내용</th>
                        <th class="p-4 font-semibold text-right">금액</th>
                        <th class="p-4 font-semibold text-center">관리</th>
                    </tr>
                </thead>
                <tbody id="listBody" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const categoryMap = {
        income: [{v: '급여', l: '💵 급여'}, {v: '주식', l: '📈 주식'}, {v: '부동산', l: '🏠 부동산'}, {v: '기타', l: 'ETC 기타'}],
        expense: [{v: '식비', l: '🍔 식비'}, {v: '카페', l: '☕ 카페'}, {v: '주거', l: '🏠 주거'}, {v: '통신', l: '📱 통신'}, {v: '보험', l: '🛡️ 보험'}, {v: '세금', l: '📜 세금'}, {v: '이자', l: '🏦 이자'}, {v: '교통', l: '🚌 교통'}, {v: '여행', l: '✈️ 여행'}, {v: '문화', l: '🎬 문화'}, {v: '경조사', l: '🎁 경조사'}, {v: '헬스', l: '💪 헬스'}, {v: '뷰티', l: '💄 뷰티'}, {v: '데이트', l: '❤️ 데이트'}, {v: '취미', l: '🎨 취미'}, {v: '기타', l: 'ETC 기타'}]
    };

    let db = []; // 서버에서 받아온 데이터를 담을 바구니
    const API_URL = '/api/data';
    let trendChartObj = null, categoryChartObj = null;
    Chart.register(ChartDataLabels);

    window.onload = async () => {
        const now = new Date();
        document.getElementById('startMonth').value = new Date(now.getFullYear(), now.getMonth() - 5, 2).toISOString().substring(0, 7);
        document.getElementById('endMonth').value = new Date().toISOString().substring(0, 7);
        document.getElementById('filterMonth').value = new Date().toISOString().substring(0, 7);
        document.getElementById('targetDate').value = new Date().toISOString().substring(0, 10);
        
        updateCategoryOptions();
        await fetchData(); 
    };

    // 서버에서 데이터 가져오기
    async function fetchData() {
        try {
            const res = await fetch(API_URL);
            db = await res.json();
            renderUI();
        } catch (e) {
            console.error("서버 연결 실패:", e);
        }
    }

    // 저장 및 수정 통합 핸들러
    async function handleSave() {
        const type = document.querySelector('input[name="trType"]:checked').value;
        const date = document.getElementById('targetDate').value;
        const main = document.getElementById('mainCat').value;
        const sub = document.getElementById('subCat').value || "-";
        const amount = parseInt(document.getElementById('targetAmount').value);
        const editId = document.getElementById('editId').value;

        if (!date || isNaN(amount)) return alert("정보를 모두 입력하세요.");

        const payload = { type, date, main, sub, amount };
        const method = editId ? 'PUT' : 'POST';
        const url = editId ? `${API_URL}/${editId}` : API_URL;

        await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        resetForm();
        await fetchData();
    }

    async function deleteEntry(id) {
        if(!confirm("삭제하시겠습니까?")) return;
        await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        await fetchData();
    }

    function updateCategoryOptions(selectedVal = null) {
        const type = document.querySelector('input[name="trType"]:checked').value;
        const select = document.getElementById('mainCat');
        select.innerHTML = categoryMap[type].map(i => `<option value="${i.v}">${i.l}</option>`).join('');
        if (selectedVal) select.value = selectedVal;
    }

    function renderUI() {
        const filterMonth = document.getElementById('filterMonth').value;
        const filtered = db.filter(i => i.date.startsWith(filterMonth));
        const tbody = document.getElementById('listBody');

        tbody.innerHTML = filtered.map(i => `
            <tr class="hover:bg-slate-50 transition-colors">
                <td class="p-4 text-sm text-slate-600">${i.date}</td>
                <td class="p-4 text-center"><span class="px-2 py-1 rounded text-[10px] font-bold ${i.type === 'income' ? 'bg-blue-100 text-blue-600' : 'bg-red-100 text-red-600'}">${i.type === 'income' ? '수입' : '지출'}</span></td>
                <td class="p-4 text-sm font-medium text-slate-700">${i.main_category}</td>
                <td class="p-4 text-sm text-slate-500">${i.sub_category}</td>
                <td class="p-4 text-right font-bold ${i.type === 'income' ? 'text-blue-600' : 'text-red-600'}">${i.type === 'income' ? '+' : '-'}${i.amount.toLocaleString()}원</td>
                <td class="p-4 text-center">
                    <button onclick="editEntry(${i.id})" class="text-slate-400 hover:text-blue-600 px-1">🔧</button>
                    <button onclick="deleteEntry(${i.id})" class="text-slate-400 hover:text-red-600 px-1">🗑</button>
                </td>
            </tr>
        `).join('');

        renderTrend();
        renderDoughnut(filtered);
    }

    function renderTrend() {
        const start = document.getElementById('startMonth').value, end = document.getElementById('endMonth').value;
        let months = [], curr = new Date(start + "-01"), stop = new Date(end + "-01");
        while(curr <= stop) { months.push(curr.toISOString().substring(0, 7)); curr.setMonth(curr.getMonth() + 1); }

        const incData = months.map(m => db.filter(i => i.date.startsWith(m) && i.type === 'income').reduce((s, c) => s + c.amount, 0));
        const expData = months.map(m => db.filter(i => i.date.startsWith(m) && i.type === 'expense').reduce((s, c) => s + c.amount, 0));
        const ctx = document.getElementById('trendChart').getContext('2d');

        if (trendChartObj) trendChartObj.destroy();
        trendChartObj = new Chart(ctx, {
            type: months.length > 6 ? 'line' : 'bar',
            data: {
                labels: months.map(m => "'" + m.substring(2).replace('-', '.')),
                datasets: [
                    { label: '수입', data: incData, backgroundColor: '#3b82f6', borderColor: '#3b82f6', tension: 0.3 },
                    { label: '지출', data: expData, backgroundColor: '#ef4444', borderColor: '#ef4444', tension: 0.3 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { display: false } } }
        });
    }

    function renderDoughnut(data) {
        const expOnly = data.filter(i => i.type === 'expense');
        const catSum = expOnly.reduce((acc, curr) => {
            const label = categoryMap.expense.find(c => c.v === curr.main_category)?.l || curr.main_category;
            acc[label] = (acc[label] || 0) + curr.amount;
            return acc;
        }, {});

        const ctx = document.getElementById('categoryChart').getContext('2d');
        if (categoryChartObj) categoryChartObj.destroy();
        categoryChartObj = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(catSum),
                datasets: [{ 
                    data: Object.values(catSum), 
                    backgroundColor: ['#ef4444', '#f97316', '#f59e0b', '#22c55e', '#3b82f6', '#6366f1', '#a855f7', '#ec4899'] 
                }]
            },
            options: { 
                responsive: true, maintainAspectRatio: false,
                plugins: { 
                    legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } },
                    datalabels: { color: '#fff', font: { weight: 'bold', size: 10 }, formatter: (v, ctx) => {
                        let sum = ctx.chart.data.datasets[0].data.reduce((a, b) => a + b, 0);
                        return (v * 100 / sum).toFixed(1) + "%";
                    }, display: (ctx) => (ctx.dataset.data[ctx.dataIndex] / ctx.chart.data.datasets[0].data.reduce((a, b) => a + b, 0)) > 0.05 }
                } 
            }
        });
    }

    function editEntry(id) {
        const i = db.find(x => x.id === id);
        document.getElementById(i.type === 'income' ? 'typeIncome' : 'typeExpense').checked = true;
        updateCategoryOptions(i.main_category);
        document.getElementById('targetDate').value = i.date;
        document.getElementById('subCat').value = i.sub_category;
        document.getElementById('targetAmount').value = i.amount;
        document.getElementById('editId').value = i.id;
        document.getElementById('submitBtn').innerText = "수정";
        document.getElementById('submitBtn').classList.replace('bg-slate-800', 'bg-blue-600');
    }

    function resetForm() {
        document.getElementById('subCat').value = "";
        document.getElementById('targetAmount').value = "";
        document.getElementById('editId').value = "";
        document.getElementById('submitBtn').innerText = "저장";
        document.getElementById('submitBtn').classList.replace('bg-blue-600', 'bg-slate-800');
    }

    function exportToExcel() {
        if (db.length === 0) return;
        let csv = "\uFEFF날짜,구분,분류,내용,금액\n";
        db.forEach(i => csv += `${i.date},${i.type==='income'?'수입':'지출'},${i.main_category},${i.sub_category},${i.amount}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `AccountBook_${new Date().toISOString().substring(0,10)}.csv`;
        link.click();
    }
</script>
</body>
</html>
